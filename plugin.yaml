name: hello-nousviz
display_name: Hello Nousviz
version: 1.1.0
description: >
  Bare-bones test plugin for validating the Nousviz plugin install loop.
  Exercises route hot-loading, SQL migrations, dashboard rendering, and
  uninstall with data removal. Not a product feature — install/uninstall freely.

license: MIT
icon: plug
category: integration
tags: [test, example]
visibility: public

publisher:
  slug: nousviz
  name: Nousviz
  website: https://nousviz.com
  contact_email: plugins@nousviz.com
  verified: true

repository: https://github.com/nousviz/plugin-hello-nousviz
homepage: https://github.com/nousviz/plugin-hello-nousviz

requires:
  postgres: true

databases:
  postgres:
    tables:
      - hello_items
      - hello_events

navigation:
  - label: Overview
    href: /plugin/hello-nousviz/overview
    icon: plug
    position: sidebar
  - label: Alerts
    href: /plugin/hello-nousviz/alerts
    icon: plug
    position: sidebar

settings:
  - name: sync_enabled
    label: Enable sync
    type: toggle
    default: true
    description: Run the sync script on schedule.
  - name: item_limit
    label: Items per sync
    type: number
    default: 100
    description: Maximum number of items to insert per sync run.
  - name: event_label
    label: Event label
    type: text
    default: "sync_run"
    description: event_type value written to hello_events on each sync.

dashboards:
  - name: overview
    label: Overview
  - name: analytics
    label: Analytics
