name: hello-nousviz
display_name: Hello Nousviz
version: 1.2.0
description: >
  Ultimate skeleton plugin for validating every Nousviz plugin contract feature.
  Exercises: route hot-loading, SQL migrations, dashboard rendering, settings
  persistence, sync with real data generation, alert templates, data port,
  datasets, insights, and clean uninstall. Not a product feature — install and
  uninstall freely.

license: MIT
icon: plug
category: integration
tags: [test, example, skeleton]
visibility: public

publisher:
  slug: nousviz
  name: Nousviz
  website: https://nousviz.com
  contact_email: plugins@nousviz.com
  verified: true

repository: https://github.com/nousviz/plugin-hello-nousviz
homepage: https://github.com/nousviz/plugin-hello-nousviz

requires:
  postgres: true

databases:
  postgres:
    tables:
      - hello_items
      - hello_events

navigation:
  - label: Overview
    href: /plugin/hello-nousviz/overview
    icon: plug
    position: sidebar
  - label: Analytics
    href: /plugin/hello-nousviz/analytics
    icon: plug
    position: sidebar
  - label: Alerts
    href: /plugin/hello-nousviz/alerts
    icon: plug
    position: sidebar

settings:
  - name: sync_enabled
    label: Enable sync
    type: toggle
    default: true
    description: When disabled, Sync Now exits immediately without generating data.
  - name: item_limit
    label: Items per sync
    type: number
    default: 5
    description: Number of random test items to insert into hello_items per sync run.
  - name: event_label
    label: Event label
    type: text
    default: "sync_run"
    description: The event_type value written to hello_events on each sync.

sync:
  script: src/sync.py
  schedule: "0 */4 * * *"
  incremental: false
  timeout: 30

datasets:
  - name: hello_items
    label: Hello Items
    db: postgres
    grain: event
    description: Test items created by sync or the API. Each has a name and active/inactive status.
  - name: hello_events
    label: Hello Events
    db: postgres
    grain: event
    description: Lifecycle events — sync runs, installs, errors. Detail stored as JSONB.

dashboards:
  - name: overview
    label: Overview
  - name: analytics
    label: Analytics
